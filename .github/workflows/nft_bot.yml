# ─────────────────────────────────────────────────────────────────
#  GitHub Actions Workflow
#  Runs the rarbtc.com NFT bot daily at 08:00 UTC.
#  Credentials are stored as GitHub Secrets — never in code.
# ─────────────────────────────────────────────────────────────────

name: NFT Bot Daily Run

on:
  schedule:
    - cron: "0 5 * * *"   # Every day at 05:00 UTC (07:00 SAST / UTC+2)
  workflow_dispatch:        # Also allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 now

jobs:
  run-bot:
    name: Run rarbtc NFT Bot
    runs-on: ubuntu-latest
    timeout-minutes: 30     # Safety cap — full run should take ~15 min

    steps:
      # 1. Check out the repository
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install Python dependencies
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # 4. Install system dependencies manually (Ubuntu 24.04 compatible)
      #    playwright install-deps fails on Ubuntu 24.04 due to libasound2 rename
      - name: Install system dependencies for Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      # 5. Install Playwright's Chromium browser only (no install-deps)
      - name: Install Playwright Chromium browser
        run: playwright install chromium

      # 6. Ensure logs directory exists before bot runs
      - name: Create logs directory
        run: mkdir -p logs

      # 7. Run the bot — credentials injected from GitHub Secrets
      - name: Run NFT bot
        env:
          RARBTC_USERNAME:             ${{ secrets.RARBTC_USERNAME }}
          RARBTC_PASSWORD:             ${{ secrets.RARBTC_PASSWORD }}
          RARBTC_RESERVATION_PASSWORD: ${{ secrets.RARBTC_RESERVATION_PASSWORD }}
        run: python bot.py

      # 8. Upload logs as a downloadable artifact (kept 30 days)
      - name: Upload run logs
        if: always()   # Upload even if the bot failed
        uses: actions/upload-artifact@v4.6.2
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: warn   # Don't fail if logs dir is empty

      # 9. Upload error screenshot if one was saved
      - name: Upload error screenshot (if any)
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: error-screenshot-${{ github.run_id }}
          path: logs/*.png
          retention-days: 30
          if-no-files-found: ignore
