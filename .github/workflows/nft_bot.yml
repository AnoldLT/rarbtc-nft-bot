name: Rarzz NFT Bot

on:
  schedule:
    - cron: "23 3 * * *"   # 03:23 UTC = 05:23 SAST
  workflow_dispatch:         # Allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-24.04
    timeout-minutes: 120    # Covers up to ~5 accounts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies (Ubuntu 24.04 — NOT playwright install-deps)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb

      - name: Install Playwright Chromium (browser only)
        run: playwright install chromium

      - name: Run NFT bot
        env:
          ACCOUNT_COUNT: ${{ vars.ACCOUNT_COUNT }}
          # Account 1
          RARBTC_USERNAME_1: ${{ secrets.RARBTC_USERNAME_1 }}
          RARBTC_PASSWORD_1: ${{ secrets.RARBTC_PASSWORD_1 }}
          RARBTC_RESERVATION_PASSWORD_1: ${{ secrets.RARBTC_RESERVATION_PASSWORD_1 }}
          # Account 2
          RARBTC_USERNAME_2: ${{ secrets.RARBTC_USERNAME_2 }}
          RARBTC_PASSWORD_2: ${{ secrets.RARBTC_PASSWORD_2 }}
          RARBTC_RESERVATION_PASSWORD_2: ${{ secrets.RARBTC_RESERVATION_PASSWORD_2 }}
          # Account 3
          RARBTC_USERNAME_3: ${{ secrets.RARBTC_USERNAME_3 }}
          RARBTC_PASSWORD_3: ${{ secrets.RARBTC_PASSWORD_3 }}
          RARBTC_RESERVATION_PASSWORD_3: ${{ secrets.RARBTC_RESERVATION_PASSWORD_3 }}
          # Account 4
          RARBTC_USERNAME_4: ${{ secrets.RARBTC_USERNAME_4 }}
          RARBTC_PASSWORD_4: ${{ secrets.RARBTC_PASSWORD_4 }}
          RARBTC_RESERVATION_PASSWORD_4: ${{ secrets.RARBTC_RESERVATION_PASSWORD_4 }}
          # Account 5
          RARBTC_USERNAME_5: ${{ secrets.RARBTC_USERNAME_5 }}
          RARBTC_PASSWORD_5: ${{ secrets.RARBTC_PASSWORD_5 }}
          RARBTC_RESERVATION_PASSWORD_5: ${{ secrets.RARBTC_RESERVATION_PASSWORD_5 }}
          # Email
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          NOTIFY_EMAIL_TO: ${{ secrets.NOTIFY_EMAIL_TO }}
          NOTIFY_EMAIL_FROM: ${{ secrets.NOTIFY_EMAIL_FROM }}
        run: python bot.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
